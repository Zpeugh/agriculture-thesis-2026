<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>The Lag Trade — Oil Leads, Food Follows</title>
  <meta name="description" content="A pure-options convexity play on the soft-commodity catch-up to the 2026 oil shock. Live EODHD options data, three scenarios, probability-weighted projection." />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#1F3A27" />
  <style>
    :root {
      --bone: #F4EDE4;
      --bone-light: #FAF7F2;
      --bone-dark: #E8DFD3;
      --bone-darker: #D8CDB9;
      --green: #4A7C59;
      --green-light: #6B9E7A;
      --green-dark: #345A3F;
      --green-deep: #1F3A27;
      --salmon: #C75B39;
      --salmon-light: #D4795E;
      --salmon-dark: #A44828;
      --ink: #2B2925;
      --black: #1A1A1A;
      --gray: #6B6560;
      --gray-light: #8A8578;
      --wheat: #D4B896;
      --gold: #B68A2E;
      --gold-soft: #D9B565;
      --blue: #3F6079;
      --blue-soft: #5E7E96;
      --oil: #2B2925;
      --pad-x: clamp(16px, 2.5vw, 40px);
      --pad-y: clamp(40px, 7vw, 96px);
      --section-gap: clamp(60px, 10vw, 140px);
      --max-w: 1840px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { margin: 0; min-height: 100%; background: var(--bone); overflow-x: hidden; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
    button, input, select, textarea { font: inherit; color: inherit; }
    img, svg { display: block; max-width: 100%; }

    /* ───── Ambient wheat field ───── */
    .wheat-field {
      position: fixed; bottom: 0; left: 0;
      width: 100vw; height: clamp(180px, 28vh, 340px);
      pointer-events: none; z-index: 0; overflow: hidden;
    }
    .wheat-field svg { position: absolute; bottom: -20px; left: 0; width: 100%; height: 100%; }
    .stalk { transform-box: fill-box; transform-origin: 50% 100%; will-change: transform; }
    @keyframes windA { 0%,100%{transform:rotate(-3.5deg) translateX(0);} 50%{transform:rotate(4.5deg) translateX(2px);} }
    @keyframes windB { 0%,100%{transform:rotate(-2.2deg) translateX(0);} 50%{transform:rotate(3.2deg) translateX(1px);} }
    @keyframes windC { 0%,100%{transform:rotate(-4.2deg) translateX(-1px);} 50%{transform:rotate(2.8deg) translateX(3px);} }
    @keyframes windD { 0%,100%{transform:rotate(-3deg) translateX(0);} 50%{transform:rotate(5.5deg) translateX(2px);} }
    @keyframes windE { 0%,100%{transform:rotate(-5deg) translateX(-2px);} 50%{transform:rotate(3deg) translateX(0);} }
    @media (prefers-reduced-motion: reduce) {
      .stalk, .pulse-ring, .ribbon-anim { animation: none !important; }
    }

    @keyframes drift { 0% { transform: translate3d(0,0,0); opacity: 0; } 10% { opacity: 0.35; } 90% { opacity: 0.2; } 100% { transform: translate3d(var(--dx), -120vh, 0); opacity: 0; } }
    .dust { position: fixed; inset: 0 0 -40px 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .dust span {
      position: absolute; bottom: -30px;
      width: 3px; height: 3px;
      background: radial-gradient(circle, rgba(182,138,46,0.6), transparent 70%);
      border-radius: 50%; animation: drift linear infinite;
    }

    .top-haze {
      position: fixed; top: 0; left: 0; right: 0;
      height: clamp(280px, 45vh, 520px);
      pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(182,138,46,0.14), transparent 65%);
    }

    .app-shell { position: relative; z-index: 1; }

    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.85s cubic-bezier(0.22,0.61,0.36,1), transform 0.85s cubic-bezier(0.22,0.61,0.36,1); }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .reveal-d-1 { transition-delay: 0.08s; }
    .reveal-d-2 { transition-delay: 0.16s; }
    .reveal-d-3 { transition-delay: 0.24s; }
    .reveal-d-4 { transition-delay: 0.32s; }
    .reveal-d-5 { transition-delay: 0.40s; }

    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22,0.61,0.36,1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .card-lift { transition: transform 0.4s cubic-bezier(0.22,0.61,0.36,1), box-shadow 0.4s ease, border-color 0.4s ease; }
    @media (hover: hover) {
      .card-lift:hover { transform: translateY(-3px); box-shadow: 0 24px 52px -28px rgba(52,90,63,0.35); }
    }

    .scenario-btn { transition: all 0.4s cubic-bezier(0.22,0.61,0.36,1); }

    @keyframes pulseRing { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 0; transform: scale(1.8); } }
    .pulse-ring { animation: pulseRing 2.4s ease-out infinite; transform-box: fill-box; transform-origin: center; }

    @keyframes ribbonShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    .ribbon-anim { background-size: 200% 200%; animation: ribbonShift 12s ease-in-out infinite; }

    .grain-texture { position: relative; }
    .grain-texture::before {
      content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(182,138,46,0.04) 0, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(74,124,89,0.03) 0, transparent 45%);
    }

    /* Layout helpers */
    .container { max-width: var(--max-w); margin: 0 auto; padding-left: var(--pad-x); padding-right: var(--pad-x); }
    .container-narrow { max-width: 1280px; margin: 0 auto; padding-left: var(--pad-x); padding-right: var(--pad-x); }
    .stack-md > * + * { margin-top: clamp(16px, 2.4vw, 24px); }
    .stack-lg > * + * { margin-top: clamp(24px, 3.6vw, 40px); }
    .stack-xl > * + * { margin-top: clamp(40px, 6vw, 80px); }

    .grid-auto {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(min(280px, 100%), 1fr));
      gap: clamp(12px, 2vw, 22px);
    }
    .grid-2 { display: grid; grid-template-columns: 1fr; gap: clamp(16px, 2.5vw, 28px); }
    /* Force a strict 3-column grid on desktop for 6-item layouts (3+3) */
    .grid-3-strict { display: grid; grid-template-columns: 1fr; gap: clamp(12px, 1.6vw, 18px); }
    @media (min-width: 720px)  { .grid-3-strict { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1080px) { .grid-3-strict { grid-template-columns: repeat(3, 1fr); } }
    /* Strict 4-column grid for KPI tiles on wide screens */
    .grid-4-strict { display: grid; grid-template-columns: 1fr; gap: clamp(12px, 1.6vw, 18px); }
    @media (min-width: 600px)  { .grid-4-strict { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1080px) { .grid-4-strict { grid-template-columns: repeat(4, 1fr); } }
    .grid-3 { display: grid; grid-template-columns: 1fr; gap: clamp(12px, 2vw, 20px); }
    @media (min-width: 720px) { .grid-2 { grid-template-columns: 1fr 1fr; } .grid-3 { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 1080px) { .hero-split { grid-template-columns: 1.15fr 1fr; gap: 56px; } }

    /* Fluid typography utilities */
    .h-display { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 300; line-height: 1.05; letter-spacing: 0.4px; font-size: clamp(40px, 8.5vw, 96px); color: var(--black); }
    .h-section { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 400; line-height: 1.12; letter-spacing: 0.3px; font-size: clamp(30px, 6vw, 56px); color: var(--black); }
    .h-card    { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 600; line-height: 1.2;  font-size: clamp(20px, 2.6vw, 28px); color: var(--black); }
    .eyebrow   { font-family: 'Source Serif 4', Georgia, serif; font-weight: 700; font-size: clamp(11px, 1.2vw, 13px); letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
    .lede      { font-family: 'Source Serif 4', Georgia, serif; font-size: clamp(15px, 1.7vw, 19px); line-height: 1.65; color: var(--ink); }
    .body      { font-family: 'Source Serif 4', Georgia, serif; font-size: clamp(14px, 1.5vw, 16px); line-height: 1.6; color: var(--ink); }
    .micro     { font-family: 'Source Serif 4', Georgia, serif; font-size: clamp(11px, 1.1vw, 12px); color: var(--gray-light); letter-spacing: 0.04em; }

    /* Cards */
    .card { background: #fff; border: 1px solid var(--bone-dark); border-radius: 14px; padding: clamp(16px, 2.4vw, 28px); position: relative; }
    .card-flush { background: #fff; border: 1px solid var(--bone-dark); border-radius: 14px; overflow: hidden; }
    .card-tab  { border-top-width: 3px; border-top-style: solid; }

    /* Sticky controls bar with FLIP-style attach/detach pop animation.
       The tracker is the in-flow placeholder; the bar is the visual element that translates
       to track the viewport top when scrolled past, then snaps back with a pop on detach. */
    .controls-anchor {
      position: relative;
      margin-bottom: clamp(20px, 3vw, 32px);
    }
    .controls-tracker {
      position: relative;
      will-change: transform;
      z-index: 30;
    }
    .controls-tracker.is-stuck { z-index: 100; }
    .controls-bar {
      transition: box-shadow 0.3s cubic-bezier(0.22,0.61,0.36,1),
                  border-radius 0.3s ease,
                  background-color 0.3s ease;
      transform-origin: 50% 50%;
      will-change: transform;
    }
    .controls-tracker.is-stuck .controls-bar {
      box-shadow: 0 14px 36px -18px rgba(31,58,39,0.30), 0 1px 0 rgba(216,205,185,0.6);
      background: rgba(244,237,228,0.96) !important;
      backdrop-filter: saturate(180%) blur(18px);
      -webkit-backdrop-filter: saturate(180%) blur(18px);
    }
    @keyframes controlsAttachPop {
      0%   { transform: translateY(-12px) scale(0.98); opacity: 0.4; }
      55%  { transform: translateY(2px) scale(1.012); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes controlsDetachPop {
      0%   { transform: translateY(0) scale(1.025); box-shadow: 0 18px 40px -12px rgba(31,58,39,0.35); }
      45%  { transform: translateY(2px) scale(0.985); }
      100% { transform: translateY(0) scale(1); box-shadow: 0 0 0 rgba(0,0,0,0); }
    }
    .controls-bar.attach-pop  { animation: controlsAttachPop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .controls-bar.detach-pop  { animation: controlsDetachPop 0.55s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Risk-tolerance compact slider */
    .risk-slider {
      appearance: none; -webkit-appearance: none;
      width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--green-deep) 0%, var(--gold) 50%, var(--salmon) 100%);
      border-radius: 999px; outline: none;
    }
    .risk-slider::-webkit-slider-thumb {
      appearance: none; -webkit-appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: 2.5px solid var(--green-deep);
      box-shadow: 0 2px 8px rgba(31,58,39,0.30); cursor: pointer;
      transition: transform 0.15s ease;
    }
    .risk-slider::-webkit-slider-thumb:hover { transform: scale(1.18); }
    .risk-slider::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: 2.5px solid var(--green-deep);
      box-shadow: 0 2px 8px rgba(31,58,39,0.30); cursor: pointer;
    }

    /* Scrollbars */
    .scroll-x {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
      scrollbar-width: thin;
    }
    .scroll-x > * { scroll-snap-align: start; flex: 0 0 auto; }
    .scroll-x::-webkit-scrollbar { height: 6px; }
    .scroll-x::-webkit-scrollbar-thumb { background: var(--bone-darker); border-radius: 3px; }

    /* Responsive table */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrap table { width: 100%; min-width: 640px; border-collapse: collapse; font-family: 'Source Serif 4', Georgia, serif; }

    /* Scroll indicator */
    @keyframes bobbing { 0%, 100% { transform: translateY(0); opacity: 0.45; } 50% { transform: translateY(8px); opacity: 0.85; } }
    .scroll-indicator { animation: bobbing 2.4s ease-in-out infinite; }

    /* Cite link */
    .cite-link {
      color: var(--ink); text-decoration: none;
      background-image: linear-gradient(rgba(74,124,89,0.25), rgba(74,124,89,0.25));
      background-size: 0% 1px; background-position: 0 100%; background-repeat: no-repeat;
      transition: background-size 0.4s cubic-bezier(0.22,0.61,0.36,1), color 0.3s ease;
    }
    .cite-link:hover { background-size: 100% 1px; color: var(--green-dark); }

    .draw-line { stroke-dasharray: var(--len, 2400); stroke-dashoffset: var(--len, 2400); transition: stroke-dashoffset 1.8s cubic-bezier(0.22,0.61,0.36,1); }
    .reveal.in .draw-line { stroke-dashoffset: 0; }

    /* Tooltip */
    .tt {
      position: absolute; pointer-events: none;
      background: rgba(26,26,26,0.92); color: #fff;
      font-family: 'Source Serif 4', Georgia, serif; font-size: 12px; line-height: 1.4;
      padding: 8px 12px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      transform: translate(-50%, calc(-100% - 8px)); opacity: 0;
      transition: opacity 0.18s ease; max-width: 240px; z-index: 5;
    }
    .tt.on { opacity: 1; }

    /* Range input styling */
    input[type="range"] {
      width: 100%; height: 6px; appearance: none; background: var(--bone-darker); border-radius: 3px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--green-dark); border: 3px solid #fff; box-shadow: 0 2px 8px rgba(31,58,39,0.35); cursor: pointer; }
    input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: var(--green-dark); border: 3px solid #fff; box-shadow: 0 2px 8px rgba(31,58,39,0.35); cursor: pointer; }

    /* Number input */
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }

    * { font-variant-numeric: lining-nums tabular-nums; font-feature-settings: "lnum","tnum"; }

    /* Section anchors */
    section[id] { scroll-margin-top: 80px; }

    /* Mobile spacing fixes */
    @media (max-width: 600px) {
      .desktop-only { display: none !important; }
    }
    @media (min-width: 601px) {
      .mobile-only { display: none !important; }
    }
  </style>

  <script>
    (function renderField() {
      const field = document.getElementById('field');
      if (!field) return;
      const anims = ['windA','windB','windC','windD','windE'];
      const stalks = [];
      const isMobile = window.innerWidth < 720;
      const count = isMobile ? 28 : 52;
      for (let i = 0; i < count; i++) {
        const x = Math.round((i / (count - 1)) * 1600 + (Math.sin(i * 1.7) * 18));
        const tall = i % 2 === 0;
        const scale = (tall ? 0.88 : 0.62) + (Math.sin(i * 2.3) * 0.18);
        const y = tall ? 336 : 340 + (Math.cos(i * 1.9) * 4);
        const opacity = tall ? (0.48 + Math.sin(i * 0.9) * 0.15) : (0.3 + Math.cos(i * 0.6) * 0.1);
        const dur = (4.8 + Math.sin(i * 1.1) * 1.6).toFixed(2);
        const delay = (Math.sin(i * 3.3) * 2).toFixed(2);
        const anim = anims[i % anims.length];
        const href = tall ? '#wheatStalkTall' : '#wheatStalk';
        stalks.push(
          `<g class="stalk" style="animation:${anim} ${dur}s ease-in-out ${delay}s infinite alternate; opacity:${opacity.toFixed(2)}" transform="translate(${x},${y}) scale(${scale.toFixed(2)})"><use href="${href}"/></g>`
        );
      }
      field.innerHTML = stalks.join('');
    })();
    (function renderDust() {
      const dust = document.getElementById('dust');
      if (!dust) return;
      const isMobile = window.innerWidth < 720;
      const parts = [];
      for (let i = 0; i < (isMobile ? 8 : 18); i++) {
        const x = Math.random() * 100;
        const dx = (Math.random() * 40 - 20) + 'vw';
        const dur = (28 + Math.random() * 20).toFixed(1) + 's';
        const delay = (-Math.random() * 30).toFixed(1) + 's';
        const size = (2 + Math.random() * 3).toFixed(1) + 'px';
        parts.push(`<span style="left:${x.toFixed(1)}vw; width:${size}; height:${size}; --dx:${dx}; animation-duration:${dur}; animation-delay:${delay};"></span>`);
      }
      dust.innerHTML = parts.join('');
    })();
  </script>

/* ═══════════════════════════════════════════════════════════

const C = {
  bone: "#F4EDE4", boneLight: "#FAF7F2", boneDark: "#E8DFD3", boneDarker: "#D8CDB9",

const FH = "'Cormorant Garamond','Georgia',serif";
const FB = "'Source Serif 4','Georgia',serif";

const { useMemo, useState, useEffect, useRef, useLayoutEffect, useCallback } = React;

/* ─── Macro snapshot (FRED Apr 2026 + spot WTI May 2026) ─── */

/* ─── Risk tolerance → re-allocate within each category ───
   t=0   → very safe  (75% ATM / 22% Mid / 3%  Near)
   t=50  → balanced   (50% ATM / 31% Mid / 19% Near)  ← exact default
   t=100 → max convex (25% ATM / 40% Mid / 35% Near)
   Linear interpolation around the default mid-point. */
function getProfileWeights(riskTolerance) {
  const t = Math.max(0, Math.min(100, riskTolerance)) / 100;
  const shift = 2 * t - 1;            // -1 (safe) → +1 (convex)
  const atm  = 0.50 - 0.25 * shift;   // 0.75 → 0.25
  const near = 0.19 + 0.16 * shift;   // 0.03 → 0.35
  const mid  = 1 - atm - near;        // 0.22 → 0.40
  return { atm_long: atm, mid_otm: mid, near_otm: near };
}
function adjustPositions(positions, riskTolerance) {
  const pw = getProfileWeights(riskTolerance);
  return positions.map(p => ({ ...p, weight: CATEGORIES[p.category].total * pw[p.profile] }));
}
function riskLabel(t) {
  if (t < 20) return "Very safe";
  if (t < 40) return "Conservative";
  if (t < 60) return "Balanced";
  if (t < 80) return "Convex";
  return "Maximum convexity";
}

/* ═══════════════════════════════════════════════════════════
   BLACK-SCHOLES PRICER
   ═══════════════════════════════════════════════════════════ */
function normCDF(x) {
  const a1=0.254829592, a2=-0.284496736, a3=1.421413741, a4=-1.453152027, a5=1.061405429, p=0.3275911;
  const sign = x < 0 ? -1 : 1;
  const ax = Math.abs(x) / Math.sqrt(2);
  const t = 1.0 / (1.0 + p * ax);
  const y = 1.0 - (((((a5*t + a4)*t) + a3)*t + a2)*t + a1)*t * Math.exp(-ax*ax);
  return 0.5 * (1.0 + sign * y);
}
function bsCall(S, K, T, r, sigma, q=0) {
  if (T <= 0 || sigma <= 0) return Math.max(S - K, 0);
  const d1 = (Math.log(S / K) + (r - q + sigma * sigma / 2) * T) / (sigma * Math.sqrt(T));
  const d2 = d1 - sigma * Math.sqrt(T);
  return S * Math.exp(-q * T) * normCDF(d1) - K * Math.exp(-r * T) * normCDF(d2);
}

function useInView(opts) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setInView(true); o.disconnect(); } }, opts || { threshold: 0.15, rootMargin: "0px 0px -60px 0px" });
    o.observe(el);
    return () => o.disconnect();
  }, []);
  return [ref, inView];
}

function Reveal({ children, delay=0, as: Tag="div", className="", style }) {
  const [ref, inView] = useInView();
  const cls = `reveal ${delay > 0 ? `reveal-d-${delay}` : ""} ${inView ? "in" : ""} ${className}`.trim();
  return <Tag ref={ref} className={cls} style={style}>{children}</Tag>;
}

function AnimatedCounter({ value, format=(v)=>v.toFixed(0), duration=900, className, style }) {
  const [display, setDisplay] = useState(value);
  const fromRef = useRef(value);
  const rafRef = useRef(null);
  useEffect(() => {
    const from = fromRef.current;
    const to = value;
    if (from === to) return;
    const start = performance.now();
    const step = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const v = from + (to - from) * eased;
      setDisplay(v);
      if (t < 1) rafRef.current = requestAnimationFrame(step);
      else fromRef.current = to;
    };
    rafRef.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(rafRef.current);
  }, [value, duration]);
  return <span className={className} style={style}>{format(display)}</span>;
}

/* ═══════════════════════════════════════════════════════════
   SIMULATION ENGINE — option valuation under each scenario
   ═══════════════════════════════════════════════════════════ */
function valuePosition(p, scenarioKey, horizonMonths, budget) {
  const sc = SCENARIOS[scenarioKey];
  const move = sc.moves[p.ticker];
  const newSpot = SPOTS[p.ticker] * (1 + move);
  // Time remaining at scenario realization
  const timeElapsedDays = horizonMonths * 30.4375;
  const timeRemainDays = Math.max(0, p.dte - timeElapsedDays);
  const T = timeRemainDays / 365;
  // IV expansion in bull/bear (vega plays both ways)
  const ivAdj = scenarioKey === "bull" ? 1.20 : scenarioKey === "bear" ? 0.85 : 1.00;
  const sigma = p.iv * ivAdj;
  // 4% risk-free, dividend yield from underlying. Calibrated against EODHD market premium.
  const q = DIV_YIELD[p.ticker] || 0;
  const newPremium = bsCall(newSpot, p.strike, T, 0.04, sigma, q);

  const dollarsAlloc = budget * p.weight;
  const contracts = Math.max(0, Math.floor(dollarsAlloc / (p.premium * 100)));
  const cost = contracts * p.premium * 100;
  const exitValue = contracts * newPremium * 100;
  const pnl = exitValue - cost;
  const ret = cost > 0 ? (pnl / cost) * 100 : 0;
  return { ...p, newSpot, newPremium, contracts, cost, exitValue, pnl, ret, scenarioMove: move };
}

function buildSimulation(budget, horizonMonths, positions) {
  const pos = positions || POSITIONS;
  const out = {};
  SC_KEYS.forEach(key => {
    const valued = pos.map(p => valuePosition(p, key, horizonMonths, budget));
    const totalCost = valued.reduce((s, p) => s + p.cost, 0);
    const totalPnl = valued.reduce((s, p) => s + p.pnl, 0);
    const totalRet = totalCost > 0 ? (totalPnl / totalCost) * 100 : 0;
    out[key] = { positions: valued, totalCost, totalPnl, totalRet };
  });
  // Use normalized probabilities (user's raw sum = 105%, normalized to 100%) for EV
  const ev = SC_KEYS.reduce((s, key) => s + out[key].totalPnl * PROB_NORM(key), 0);
  const evRet = out.base.totalCost > 0 ? (ev / out.base.totalCost) * 100 : 0;
  out.expected = { ev, evRet };
  return out;
}

/* ═══════════════════════════════════════════════════════════
   PIE CHART · animated donut, hover-lift slices
   ═══════════════════════════════════════════════════════════ */
const polar = (cx, cy, r, deg) => {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
};
const arcPath = (cx, cy, r, startAngle, endAngle) => {
  const start = polar(cx, cy, r, endAngle);
  const end   = polar(cx, cy, r, startAngle);
  const large = endAngle - startAngle <= 180 ? "0" : "1";
  return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${large} 0 ${end.x} ${end.y} Z`;
};

function PieChart({ slices, size = 220, innerLabel, innerValue, innerSub, rotate = 0 }) {
  const [ref, inView] = useInView({ threshold: 0.25 });
  const [hoverIdx, setHoverIdx] = useState(null);
  const cx = size / 2, cy = size / 2;
  const r = size / 2 - 6;
  const innerR = size * 0.34;

  const total = slices.reduce((s, sl) => s + sl.value, 0);
  let cumulative = 0;
  const enriched = slices.map((sl, i) => {
    const startAngle = (cumulative / total) * 360 + rotate;
    cumulative += sl.value;
    const endAngle = (cumulative / total) * 360 + rotate;
    const midAngle = (startAngle + endAngle) / 2;
    const offset = polar(0, 0, 8, midAngle);
    return { ...sl, startAngle, endAngle, midAngle, offset, idx: i };
  });

  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block", width: size, height: size }}>
      <svg width={size} height={size} style={{ display: "block", overflow: "visible" }}>
        <defs>
          <filter id={`pieShadow-${size}`} x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="4"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {enriched.map((sl, i) => {
          const isHover = hoverIdx === i;
          const scale = inView ? 1 : 0.4;
          const opacity = inView ? 1 : 0;
          const tx = isHover ? sl.offset.x : 0;
          const ty = isHover ? sl.offset.y : 0;
          return (
            <g key={i}
               style={{
                 opacity,
                 transform: `translate(${tx}px, ${ty}px) scale(${scale})`,
                 transformOrigin: `${cx}px ${cy}px`,
                 transition: `transform 0.7s cubic-bezier(0.22,0.61,0.36,1) ${i * 80}ms, opacity 0.5s ease ${i * 80}ms`,
                 cursor: "pointer",
               }}
               onMouseEnter={() => setHoverIdx(i)}
               onMouseLeave={() => setHoverIdx(null)}>
              <path d={arcPath(cx, cy, r, sl.startAngle, sl.endAngle)}
                    fill={sl.color}
                    filter={`url(#pieShadow-${size})`}/>
            </g>
          );
        })}
        <circle cx={cx} cy={cy} r={innerR} fill={C.boneLight}/>
        <circle cx={cx} cy={cy} r={innerR} fill="none" stroke={C.boneDark} strokeWidth="1"/>
        {innerLabel && (
          <text x={cx} y={cy - 12} textAnchor="middle" fontFamily={FH} fontSize="10" fill={C.gray} style={{ textTransform: "uppercase", letterSpacing: "0.18em", fontWeight: 600 }}>{innerLabel}</text>
        )}
        {innerValue && (
          <text x={cx} y={cy + 8} textAnchor="middle" fontFamily={FH} fontSize="22" fontWeight="700" fill={C.black}>{innerValue}</text>
        )}
        {innerSub && (
          <text x={cx} y={cy + 26} textAnchor="middle" fontFamily={FB} fontSize="10" fill={C.grayLight}>{innerSub}</text>
        )}
      </svg>
      {hoverIdx !== null && enriched[hoverIdx] && enriched[hoverIdx].tooltip && (
        <div style={{
          position: "absolute",
          top: -8, left: "50%",
          transform: "translate(-50%, -100%)",
          background: "rgba(26,26,26,0.95)",
          color: "#fff",
          fontFamily: FB,
          fontSize: 12, lineHeight: 1.5,
          padding: "8px 12px",
          borderRadius: 8,
          boxShadow: "0 8px 24px rgba(0,0,0,0.25)",
          maxWidth: 240,
          pointerEvents: "none",
          zIndex: 5,
        }}>
          {enriched[hoverIdx].tooltip}
        </div>
      )}
    </div>
  );
}

/* Per-category card with pie + position list */
function CategoryCard({ cat, budget }) {
  // Use the category's 3-tone palette (darker = anchor, lighter = convexity)
  const slices = cat.positions.map(p => {
    const pr = PROFILES[p.profile];
    const tone = cat.palette[p.profile];
    return {
      label: p.ticker,
      value: p.weight,
      color: tone,
      tooltip: `${p.ticker} ${p.strike}C ${p.expLabel} · ${pr.short} · ${(p.weight * 100).toFixed(0)}% (${fmtUSD0(budget * p.weight)})`,

    <div className="card" style={{ borderTop: `4px solid ${cat.color}`, padding: "20px 22px" }}>

function ChinaPanel() {
  // China holds ~138 MMT wheat, ~168 MMT corn (USDA WASDE Apr 2026)
  // Global wheat ending stocks: 270 MMT
  // China share: ~51% wheat, ~66% corn
  const W = 600, H = 220, L = 110, R = 30, T = 16, B = 16;
  const innerW = W - L - R;
  const data = [
    { label: "China",         value: 138, color: C.salmon },
    { label: "India",         value: 28,  color: C.gold },
    { label: "Russia",        value: 18,  color: C.green },
    { label: "EU",            value: 14,  color: C.blue },
    { label: "US",            value: 21,  color: C.greenDark },
    { label: "All others",    value: 51,  color: C.gray },
  ];
  const max = Math.max(...data.map(d => d.value));

  return (
    <section id="bear" style={{ marginTop: "var(--section-gap)" }}>
      <div className="container">
        <Reveal>
          <div className="eyebrow" style={{ color: C.salmon }}>The bear cases · 5% + 5% probability</div>
          <h2 className="h-section" style={{ marginTop: 12 }}>
            China sits on more grain<br/>
            <span style={{ fontStyle: "italic", color: C.salmon, fontWeight: 500 }}>than the rest of the world combined.</span>
          </h2>
          <p className="lede" style={{ maxWidth: "64ch", marginTop: 14 }}>
            China holds an estimated <strong>138 MMT</strong> of wheat and <strong>168 MMT</strong> of corn — over half of all global ending stocks of both crops. The bear cases for soft commodities aren't supply or demand. They're <strong>Beijing decisions</strong>.<br/><br/>
            The Super Bear (#1, 5%) requires a coordinated Trump subsidy + China dump miracle. The TACO + China path (#2b, 5%) requires the same Chinese release combined with Trump folding. Both ride on a Beijing political move that has no historical precedent at scale.
          </p>
        </Reveal>

        <div className="grid-2" style={{ marginTop: 28, gap: 28 }}>
          <Reveal delay={1}>
            <div className="card stack-md">
              <div className="micro" style={{ color: C.gray, fontWeight: 700, letterSpacing: "0.18em" }}>GLOBAL WHEAT ENDING STOCKS · MY 2025/26 (MMT)</div>
              <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
                {data.map((d, i) => {
                  const y = T + i * ((H - T - B) / data.length);
                  const barH = (H - T - B) / data.length - 6;
                  const w = (d.value / max) * innerW;
                  return (
                    <g key={d.label}>
                      <text x={L - 12} y={y + barH/2 + 4} textAnchor="end" fontFamily={FB} fontSize="13" fill={C.ink} fontWeight="600">{d.label}</text>
                      <rect x={L} y={y} width={w} height={barH} fill={d.color} opacity="0.85" rx="2"/>

                    </g>
                  );
                })}
              </svg>
              <div className="micro" style={{ color: C.grayLight, lineHeight: 1.55, marginTop: 4 }}>
                Source: USDA FAS PSD database, March 2026. China's actual reserves are likely higher — Sinograin discloses limited data.
              </div>
            </div>
          </Reveal>

            <div className="stack-md">
              <div className="card" style={{ borderTop: `3px solid ${C.salmon}` }}>
                <div className="micro" style={{ color: C.salmon, fontWeight: 700, letterSpacing: "0.18em" }}>THE SOFT-POWER PLAY</div>
                <h3 className="h-card" style={{ marginTop: 8 }}>What if Beijing exports?</h3>

                <div className="micro" style={{ color: C.gold, fontWeight: 700, letterSpacing: "0.18em" }}>WHY ONLY 10% ODDS</div>

                </p>
              </div>
              <div className="card" style={{ borderTop: `3px solid ${C.green}` }}>
                <div className="micro" style={{ color: C.green, fontWeight: 700, letterSpacing: "0.18em" }}>PRICE IMPACT IF IT HAPPENS</div>
                <p className="body" style={{ marginTop: 8 }}>

                </p>
              </div>
            </div>
          </Reveal>
        </div>
      </div>

/* ═══════════════════════════════════════════════════════════
   PER-TICKER HISTORY + SCENARIO PROJECTION CHART
   ═══════════════════════════════════════════════════════════ */
function TickerChart({ ticker, history, currentSpot, scenarios, strikes }) {
  const meta = TICKER_META[ticker];
  const n = history.length;
  // Layout: x-axis spans 24 historical months + 6 future months
  const totalMonths = 30;
  const histMonths = 24;
  const futureMonths = 6;
  const W = 460, H = 220, L = 38, R = 84, T = 14, B = 26;
  const innerW = W - L - R, innerH = H - T - B;

  // y-range: include all historical + scenario targets + strikes
  const scenarioVals = scenarios.map(s => s.target);
  const strikeVals = strikes.map(s => s.value);
  const allVals = [...history, ...scenarioVals, ...strikeVals, currentSpot];
  const yMin = Math.min(...allVals) * 0.95;
  const yMax = Math.max(...allVals) * 1.05;
  const yRange = yMax - yMin;

  // Convert week index → x px (each week = histMonths/n months)
  const weekFrac = (i) => i / (n - 1) * histMonths; // 0..histMonths
  const xPx = (months) => L + (months / totalMonths) * innerW;
  const yPx = (val) => T + innerH - ((val - yMin) / yRange) * innerH;

  // Historical line path
  const histPath = history.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xPx(weekFrac(i)).toFixed(1)} ${yPx(v).toFixed(1)}`).join(' ');
  const histArea = `${histPath} L ${xPx(histMonths).toFixed(1)} ${yPx(yMin).toFixed(1)} L ${xPx(0).toFixed(1)} ${yPx(yMin).toFixed(1)} Z`;

  // Future projection lines (one per scenario, current → target at +6mo)
  const futureX = xPx(histMonths + futureMonths);
  const currentX = xPx(histMonths);

  const [ref, inView] = useInView({ threshold: 0.2 });
  const [hoverScenario, setHoverScenario] = useState(null);

  // Y-axis tick values
  const yTicks = (() => {
    const niceStep = (range) => {
      const exp = Math.floor(Math.log10(range / 4));
      const base = Math.pow(10, exp);
      const norm = range / 4 / base;
      const step = norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10;
      return step * base;
    };
    const step = niceStep(yRange);
    const start = Math.ceil(yMin / step) * step;
    const ticks = [];
    for (let v = start; v <= yMax; v += step) ticks.push(v);
    return ticks;
  })();

  return (
    <div ref={ref} className="card" style={{ padding: "16px 18px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10, gap: 8 }}>
        <div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
            <span style={{ fontFamily: FH, fontSize: 22, fontWeight: 700, color: C.black, letterSpacing: 0.4 }}>{ticker}</span>
            <span className="micro" style={{ color: C.grayLight, fontSize: 11 }}>{meta.sector}</span>
          </div>
          <div className="micro" style={{ color: C.gray, marginTop: 2, fontSize: 11 }}>{meta.name}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontFamily: FH, fontSize: 22, fontWeight: 700, color: C.black }}>${currentSpot.toFixed(2)}</div>
          <div className="micro" style={{ color: meta.yoy >= 0 ? C.green : C.salmon, fontWeight: 700, fontSize: 11 }}>{meta.yoy >= 0 ? '+' : ''}{meta.yoy.toFixed(1)}% YoY</div>
        </div>
      </div>

      <svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet" style={{ display: "block", overflow: "visible" }}>
        <defs>
          <linearGradient id={`hist-${ticker}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={C.greenDeep} stopOpacity="0.16"/>
            <stop offset="100%" stopColor={C.greenDeep} stopOpacity="0"/>
          </linearGradient>
        </defs>

        {/* Y-axis grid */}
        {yTicks.map(v => (
          <g key={v}>
            <line x1={L} x2={W - R + 6} y1={yPx(v)} y2={yPx(v)} stroke={C.boneDark} strokeWidth="0.5" strokeDasharray="2 4" opacity="0.7"/>
            <text x={L - 6} y={yPx(v) + 3} textAnchor="end" fontFamily={FB} fontSize="9" fill={C.grayLight}>${v.toFixed(0)}</text>
          </g>
        ))}

        {/* Vertical separator at "today" */}
        <line x1={currentX} x2={currentX} y1={T} y2={T + innerH} stroke={C.gray} strokeWidth="1" strokeDasharray="3 3" opacity="0.5"/>
        <text x={currentX} y={T + innerH + 14} textAnchor="middle" fontFamily={FB} fontSize="9" fill={C.gray}>NOW</text>

        {/* Strike lines */}
        {strikes.map((s, i) => (
          <g key={i}>
            <line x1={L} x2={W - R + 6} y1={yPx(s.value)} y2={yPx(s.value)} stroke={C.gold} strokeWidth="0.8" strokeDasharray="1 3" opacity="0.6"/>
            <text x={W - R + 8} y={yPx(s.value) + 3} fontFamily={FB} fontSize="9" fill={C.gold} fontWeight="600">${s.value} {s.label}</text>
          </g>
        ))}

        {/* Historical area + line */}
        <path d={histArea} fill={`url(#hist-${ticker})`} opacity={inView ? 1 : 0} style={{ transition: "opacity 0.8s ease 0.3s" }}/>
        <path d={histPath}
              fill="none"
              stroke={C.greenDeep}
              strokeWidth="2"
              strokeLinecap="round"
              strokeLinejoin="round"
              style={{
                strokeDasharray: 800,
                strokeDashoffset: inView ? 0 : 800,
                transition: "stroke-dashoffset 1.6s cubic-bezier(0.22,0.61,0.36,1)",
              }}/>

        {/* Current spot dot */}
        <circle cx={currentX} cy={yPx(currentSpot)} r="4.5" fill={C.greenDeep} stroke="#fff" strokeWidth="2"
                opacity={inView ? 1 : 0} style={{ transition: "opacity 0.4s ease 1.4s" }}/>

        {/* Future projection lines (one per scenario) */}
        {scenarios.map((s, i) => {
          const isHover = hoverScenario === i;
          return (
            <g key={s.key}
               onMouseEnter={() => setHoverScenario(i)}
               onMouseLeave={() => setHoverScenario(null)}
               style={{ cursor: "pointer" }}>
              <line
                x1={currentX} y1={yPx(currentSpot)}
                x2={futureX} y2={yPx(s.target)}
                stroke={s.color}
                strokeWidth={isHover ? 2.4 : 1.4}
                strokeOpacity={inView ? (0.55 + s.prob * 0.6) : 0}
                style={{ transition: "stroke-opacity 0.6s ease 1.6s, stroke-width 0.2s ease" }}
              />
              <circle cx={futureX} cy={yPx(s.target)} r={isHover ? 5 : 3.2}
                      fill={s.color}
                      opacity={inView ? 1 : 0}
                      style={{ transition: "opacity 0.4s ease 1.8s" }}/>
              {/* Right-edge label per scenario */}
              <text x={futureX + 6} y={yPx(s.target) + 3}
                    fontFamily={FB} fontSize="9" fontWeight="700"
                    fill={s.color}
                    opacity={inView ? 1 : 0}
                    style={{ transition: "opacity 0.5s ease 1.9s" }}>
                ${s.target.toFixed(s.target < 50 ? 1 : 0)}
              </text>
            </g>
          );
        })}

        {/* X-axis labels */}
        <text x={L} y={T + innerH + 14} fontFamily={FB} fontSize="9" fill={C.grayLight}>2 yr ago</text>
        <text x={W - R} y={T + innerH + 14} textAnchor="end" fontFamily={FB} fontSize="9" fill={C.grayLight}>+6 mo</text>
      </svg>

      {/* Hover detail */}
      <div style={{ marginTop: 8, minHeight: 28, fontFamily: FB, fontSize: 11, color: C.gray, lineHeight: 1.4 }}>
        {hoverScenario !== null && scenarios[hoverScenario] ? (
          <span>
            <strong style={{ color: scenarios[hoverScenario].color }}>{scenarios[hoverScenario].label}</strong>
            {" "}({(scenarios[hoverScenario].prob * 100).toFixed(0)}%):
            target ${scenarios[hoverScenario].target.toFixed(2)} —
            <strong style={{ color: scenarios[hoverScenario].target >= currentSpot ? C.green : C.salmon }}>
              {" "}{scenarios[hoverScenario].target >= currentSpot ? '+' : ''}{((scenarios[hoverScenario].target / currentSpot - 1) * 100).toFixed(0)}%
            </strong> from spot
          </span>
        ) : (
          <span>Hover a projection line · 6 scenario targets fan from current spot</span>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   INPUT CONTROLS · scroll-aware sticky bar with FLIP-style pop
   ═══════════════════════════════════════════════════════════ */
function PortfolioControls({ budget, setBudget, horizon, setHorizon, active, setActive, sim, riskTolerance, setRiskTolerance }) {
  const trackerRef = useRef(null);
  const barRef = useRef(null);
  const stuckRef = useRef(false);
  const [isStuck, setIsStuck] = useState(false);

  useEffect(() => {
    let raf = null;
    let lastFrameTop = null;
    const STICKY_OFFSET = 8;

    const update = () => {
      raf = null;
      const tracker = trackerRef.current;
      const bar = barRef.current;
      if (!tracker || !bar) return;

      // Read the IN-FLOW position: temporarily clear the transform to measure
      const prevTransform = tracker.style.transform;
      tracker.style.transform = '';
      const rectFlow = tracker.getBoundingClientRect();
      tracker.style.transform = prevTransform;

      if (rectFlow.top < STICKY_OFFSET) {
        // Should be stuck — translate so the bar sits at STICKY_OFFSET from viewport top
        const dy = STICKY_OFFSET - rectFlow.top;
        tracker.style.transform = `translateY(${dy.toFixed(1)}px)`;
        if (!stuckRef.current) {
          stuckRef.current = true;
          setIsStuck(true);
          // Trigger attach pop by re-applying class
          bar.classList.remove('attach-pop'); bar.classList.remove('detach-pop');
          void bar.offsetWidth;
          bar.classList.add('attach-pop');
        }
      } else {
        // Should be inline
        tracker.style.transform = '';
        if (stuckRef.current) {
          stuckRef.current = false;
          setIsStuck(false);
          bar.classList.remove('attach-pop'); bar.classList.remove('detach-pop');
          void bar.offsetWidth;
          bar.classList.add('detach-pop');
        }
      }
      lastFrameTop = rectFlow.top;
    };
    const onScroll = () => {
      if (raf == null) raf = requestAnimationFrame(update);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll, { passive: true });
    update();
    return () => {
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onScroll);
      if (raf) cancelAnimationFrame(raf);
    };
  }, []);

  const profileWeights = getProfileWeights(riskTolerance);
  const rLabel = riskLabel(riskTolerance);
  const rColor = riskTolerance < 35 ? C.greenDeep : riskTolerance > 65 ? C.salmon : C.gold;

  return (
    <div className="controls-anchor">
      <div ref={trackerRef} className={`controls-tracker ${isStuck ? 'is-stuck' : ''}`}>
        <div className="container" style={{ paddingTop: 8, paddingBottom: 8 }}>
          <div ref={barRef} className="controls-bar card" style={{
            background: "rgba(255,255,255,0.94)",
            backdropFilter: "blur(14px)",
            WebkitBackdropFilter: "blur(14px)",
            padding: "12px 16px",
          }}>
            {/* Row 1 — scenario buttons + budget + horizon + risk */}
            <div style={{ display: "flex", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
              <div className="scroll-x" style={{ flex: "1 1 auto", paddingBottom: 0, gap: 6, minWidth: 220 }}>
                {SC_KEYS.map(k => {
                  const sc = SCENARIOS[k];
                  const isActive = active === k;
                  return (
                    <button key={k} onClick={() => setActive(k)} style={{
                      background: isActive ? sc.color : "transparent",
                      color: isActive ? "#fff" : sc.color,
                      border: `1.5px solid ${sc.color}`,
                      borderRadius: 999, padding: "6px 12px",
                      fontFamily: FB, fontSize: 12, fontWeight: 700, cursor: "pointer",
                      whiteSpace: "nowrap",
                    }}>
                      <span style={{ opacity: 0.6, fontSize: 10, marginRight: 5 }}>#{sc.short}</span>
                      {sc.label}
                      <span style={{ opacity: 0.7, marginLeft: 5, fontSize: 10, fontWeight: 600 }}>{(sc.prob*100).toFixed(0)}%</span>
                    </button>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
                <label style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: FB, fontSize: 12, color: C.gray }}>
                  <span>$</span>
                  <input
                    type="number"
                    step="5000"
                    value={budget}
                    onChange={(e) => setBudget(Math.max(1000, parseInt(e.target.value, 10) || 1000))}
                    style={{ width: 100, padding: "5px 8px", border: `1px solid ${C.boneDark}`, borderRadius: 6, fontFamily: FH, fontSize: 16, fontWeight: 700, color: C.black, background: C.boneLight, outline: "none" }}
                  />
                </label>
                <label style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: FB, fontSize: 12, color: C.gray }}>
                  <span>Horizon</span>
                  <select
                    value={horizon}
                    onChange={(e) => setHorizon(parseInt(e.target.value, 10))}
                    style={{ padding: "5px 8px", border: `1px solid ${C.boneDark}`, borderRadius: 6, fontFamily: FB, fontSize: 13, fontWeight: 600, color: C.black, background: C.boneLight, outline: "none" }}
                  >
                    <option value="3">3 mo</option>
                    <option value="6">6 mo</option>
                    <option value="9">9 mo</option>
                    <option value="12">12 mo</option>
                  </select>
                </label>
              </div>
            </div>

            {/* Row 2 — risk tolerance slider with allocation breakdown */}
            <div style={{ display: "flex", gap: 16, alignItems: "center", marginTop: 10, paddingTop: 10, borderTop: `1px solid ${C.boneDark}80`, flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 140 }}>
                <span className="micro" style={{ color: C.gray, fontWeight: 700, letterSpacing: "0.14em", fontSize: 10 }}>RISK</span>
                <span style={{ fontFamily: FH, fontSize: 14, fontWeight: 700, color: rColor }}>{rLabel}</span>
              </div>
              <div style={{ flex: "1 1 200px", minWidth: 180, display: "flex", alignItems: "center", gap: 10 }}>
                <span className="micro" style={{ color: C.greenDeep, fontWeight: 600, fontSize: 10 }}>Safe</span>
                <input
                  type="range"
                  className="risk-slider"
                  min="0" max="100" step="5"
                  value={riskTolerance}
                  onChange={(e) => setRiskTolerance(parseInt(e.target.value, 10))}
                  aria-label="Risk tolerance"
                />
                <span className="micro" style={{ color: C.salmon, fontWeight: 600, fontSize: 10 }}>Convex</span>
              </div>
              <div style={{ display: "flex", gap: 10, fontFamily: FB, fontSize: 11, alignItems: "center", flexWrap: "wrap" }}>
                <span style={{ color: C.greenDark }}>
                  <strong>{(profileWeights.atm_long * 100).toFixed(0)}%</strong> ATM
                </span>
                <span style={{ color: C.gold }}>
                  <strong>{(profileWeights.mid_otm * 100).toFixed(0)}%</strong> Mid
                </span>
                <span style={{ color: C.salmon }}>
                  <strong>{(profileWeights.near_otm * 100).toFixed(0)}%</strong> Near
                </span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   FOOTER · SOURCES
   ═══════════════════════════════════════════════════════════ */
function SourcesSection() {
  return (
    <section id="sources" style={{ marginTop: "var(--section-gap)" }}>
      <div className="container">
        <Reveal>
          <div className="eyebrow" style={{ color: C.gray }}>Sources</div>
          <h2 className="h-card" style={{ marginTop: 12 }}>The data behind the thesis</h2>
        </Reveal>
        <Reveal delay={1}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(min(280px, 100%), 1fr))", gap: "10px 32px", marginTop: 18 }}>
            {CITATIONS.map((c, i) => (
              <div key={c.url} style={{ display: "flex", gap: 10, padding: "10px 0", borderBottom: `1px solid ${C.boneDark}40` }}>
                <span style={{ fontFamily: FH, fontSize: 13, color: C.grayLight, minWidth: 22, paddingTop: 1 }}>{i+1}</span>
                <div>
                  <a href={c.url} target="_blank" rel="noopener noreferrer" className="cite-link" style={{ fontFamily: FB, fontSize: 14, lineHeight: 1.4 }}>{c.t}</a>
                  <div style={{ fontFamily: FB, fontSize: 12, color: C.gray, marginTop: 2 }}><em>{c.s}</em> · {c.d}</div>
                </div>
              </div>
            ))}
          </div>
        </Reveal>
      </div>
    </section>
  );
}

/* ═══════════════════════════════════════════════════════════
   APP
   ═══════════════════════════════════════════════════════════ */
function App() {
  const [budget, setBudget] = useState(100000);
  const [horizon, setHorizon] = useState(6);
  const [active, setActive] = useState("base");
  const [riskTolerance, setRiskTolerance] = useState(50);

  const adjustedPositions = useMemo(() => adjustPositions(POSITIONS, riskTolerance), [riskTolerance]);
  const sim = useMemo(() => buildSimulation(budget, horizon, adjustedPositions), [budget, horizon, adjustedPositions]);

  return (
    <div className="app-shell">
      {/* HEADER */}
      <header style={{ paddingTop: "clamp(20px, 3vw, 36px)" }}>
        <div className="container">
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, flexWrap: "wrap" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <Sprig size={28} color={C.greenDark} opacity={0.85}/>
              <div>
                <div style={{ fontFamily: FH, fontSize: "clamp(20px, 2.4vw, 26px)", fontWeight: 700, color: C.black, letterSpacing: "0.18em" }}>THE LAG TRADE</div>
                <div className="micro" style={{ color: C.gray, letterSpacing: "0.14em", marginTop: 2 }}>HORMUZ AFTERSHOCK · MAY {AS_OF.slice(-2)} · LIVE EODHD</div>
              </div>
            </div>
            <div className="micro desktop-only" style={{ color: C.gray, textAlign: "right", lineHeight: 1.55 }}>
              <span style={{ color: C.oil, fontWeight: 700 }}>WTI</span> $101.62 (+75% YoY)<br/>
              <span style={{ color: C.green, fontWeight: 700 }}>Wheat</span> +8% YoY · <span style={{ color: C.salmon, fontWeight: 700 }}>Diesel</span> +49%
            </div>
          </div>
        </div>
      </header>

      {/* HERO */}
      <Hero/>

      {/* OIL → FOOD OVERLAY */}
      <LagOverlay/>

      {/* CATCH-UP MATH */}
      <CatchUpMath/>

      {/* SCENARIOS HEADER */}
      <section id="scenarios" style={{ marginTop: "var(--section-gap)" }}>
        <div className="container">
          <Reveal>
            <div className="eyebrow" style={{ color: C.salmon }}>Three scenarios</div>
            <h2 className="h-section" style={{ marginTop: 12 }}>
              Pick a future.<br/>
              <span style={{ fontStyle: "italic", color: C.greenDeep, fontWeight: 500 }}>The portfolio simulates each one.</span>
            </h2>
            <p className="lede" style={{ maxWidth: "62ch", marginTop: 14 }}>
              Tap a card to set the active scenario. Every chart and table updates against your selection.
            </p>
          </Reveal>
          <Reveal delay={1}>
            <div style={{ marginTop: 28 }}>
              <ScenarioCards active={active} onPick={setActive}/>
            </div>
          </Reveal>
        </div>
      </section>

      {/* CHINA BEAR CASE DETAIL */}
      <ChinaPanel/>

      {/* BULL CASE DETAIL */}
      <BullCase/>

      {/* PORTFOLIO STICKY CONTROLS — JS-driven scroll tracking with FLIP-style detach pop */}
      <div style={{ marginTop: "calc(var(--section-gap) - 16px)" }}>
        <PortfolioControls
          budget={budget} setBudget={setBudget}
          horizon={horizon} setHorizon={setHorizon}
          active={active} setActive={setActive}
          riskTolerance={riskTolerance} setRiskTolerance={setRiskTolerance}
          sim={sim}
        />
      </div>

      {/* PORTFOLIO TABLE */}
      <PortfolioSection sim={sim} active={active} budget={budget}/>

      {/* PER-TICKER HISTORY + PROJECTIONS */}
      <TickerProjections/>

      {/* PROBABILITY-WEIGHTED PROJECTION */}
      <WeightedProjection sim={sim}/>

      {/* SOURCES */}
      <SourcesSection/>

      <footer style={{ paddingTop: 40, paddingBottom: 60 }}>
        <div className="container">
          <Divider subtle/>
          <p className="micro" style={{ textAlign: "center", color: C.grayLight, lineHeight: 1.65, maxWidth: 880, margin: "0 auto" }}>
            All option premiums and greeks captured from EODHD's US options API on {AS_OF}. Scenario premiums use Black-Scholes pricing with implied-volatility expansion of +20% in bull, −15% in bear, and assume the move plays out at the chosen horizon. Where the user-specified expiration was unavailable on the chain (ADM Jul '26, BG Jul '27, CORN Oct '26), the closest standard expiry is substituted with a note. Two listed MOS Jan '27 lines (2.5% each) are consolidated to a single 5% allocation. This is not financial advice — historical analogs do not guarantee future outcomes.
          </p>
        </div>
      </footer>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
  </script>
</body>
