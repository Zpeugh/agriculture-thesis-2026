    .wheat-field {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100vw;
      height: 340px;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .wheat-field svg {
      position: absolute;
      bottom: -20px;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .stalk { transform-box: fill-box; transform-origin: 50% 100%; will-change: transform; }
    @keyframes windA { 0%,100%{transform:rotate(-3.5deg) translateX(0);} 50%{transform:rotate(4.5deg) translateX(2px);} }

    @keyframes windD { 0%,100%{transform:rotate(-3deg) translateX(0);} 50%{transform:rotate(5.5deg) translateX(2px);} }
    @keyframes windE { 0%,100%{transform:rotate(-5deg) translateX(-2px);} 50%{transform:rotate(3deg) translateX(0);} }

      pointer-events: none; z-index: 0; overflow: hidden;

    .dust span {
      position: absolute;
      bottom: -30px;
      width: 3px; height: 3px;
      background: radial-gradient(circle, rgba(182,138,46,0.6), transparent 70%);
      border-radius: 50%;
      animation: drift linear infinite;

      position: fixed;
      top: 0; left: 0; right: 0; height: 420px;
      pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(182,138,46,0.12), transparent 65%);

    .app-shell { position: relative; z-index: 1; }

    /* ───── Reveal & animation primitives ───── */
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.8s cubic-bezier(0.22,0.61,0.36,1), transform 0.8s cubic-bezier(0.22,0.61,0.36,1); }
    .reveal.in { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.08s; }
    .reveal-delay-2 { transition-delay: 0.16s; }
    .reveal-delay-3 { transition-delay: 0.24s; }
    .reveal-delay-4 { transition-delay: 0.32s; }

    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22,0.61,0.36,1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .card-lift { transition: transform 0.4s cubic-bezier(0.22,0.61,0.36,1), box-shadow 0.4s ease, border-color 0.4s ease; }
    .card-lift:hover { transform: translateY(-3px); box-shadow: 0 24px 52px -28px rgba(52,90,63,0.35); }

    .scenario-btn { transition: all 0.4s cubic-bezier(0.22,0.61,0.36,1); }

    /* ───── SVG drawing ───── */
    .draw-line {
      stroke-dasharray: var(--len, 2000);
      stroke-dashoffset: var(--len, 2000);
      transition: stroke-dashoffset 1.8s cubic-bezier(0.22,0.61,0.36,1);
    }
    .reveal.in .draw-line { stroke-dashoffset: 0; }

    .pie-slice {
      transition: transform 0.4s cubic-bezier(0.22,0.61,0.36,1), filter 0.3s ease;
      transform-origin: center;
    }
    .pie-slice:hover { filter: brightness(1.08) drop-shadow(0 6px 18px rgba(52,90,63,0.25)); }

    /* Tick shimmer on cards after scenario change */
    @keyframes flashBorder { 0% { border-color: var(--flash-color, var(--green)); } 100% { border-color: var(--bone-dark); } }
    .flash { animation: flashBorder 0.9s ease-out; }

    @keyframes pulseRing { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 0; transform: scale(1.8); } }
    .pulse-ring { animation: pulseRing 2.4s ease-out infinite; transform-box: fill-box; transform-origin: center; }

    /* Pie tooltip */
    .pie-tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(26,26,26,0.92);
      color: #fff;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.45;
      opacity: 0;
      transform: translate(-50%, calc(-100% - 10px));
      transition: opacity 0.22s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      max-width: 240px;
      z-index: 5;
    }
    .pie-tooltip.visible { opacity: 1; }
    .pie-tooltip::after {
      content: '';
      position: absolute;
      bottom: -5px; left: 50%;
      width: 10px; height: 10px;
      background: rgba(26,26,26,0.92);
      transform: translateX(-50%) rotate(45deg);
    }

    /* Refresh button spinner */
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.9s linear infinite; }

    /* Toast */
    .toast {
      position: fixed;
      top: 24px; right: 24px;
      background: #1A1A1A;
      color: #fff;
      font-family: 'Source Serif 4', Georgia, serif;
      font-size: 14px;
      padding: 12px 18px;
      border-radius: 8px;

    @keyframes slideIn { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }

    /* Subtle background grain texture on cards */
    .grain-texture {
      position: relative;
    }
    .grain-texture::before {
      content: '';

      inset: 0;
      pointer-events: none;

    /* Ribbon gradient shift */
    @keyframes ribbonShift {

  <script>
    (function renderField() {
      const field = document.getElementById('field');
      if (!field) return;
      const anims = ['windA','windB','windC','windD','windE'];
      const stalks = [];
      for (let i = 0; i < 52; i++) {
        const x = Math.round((i / 51) * 1600 + (Math.sin(i * 1.7) * 18));
        const tall = i % 2 === 0;
        const scale = (tall ? 0.88 : 0.62) + (Math.sin(i * 2.3) * 0.18);
        const y = tall ? 336 : 340 + (Math.cos(i * 1.9) * 4);
        const opacity = tall ? (0.48 + Math.sin(i * 0.9) * 0.15) : (0.3 + Math.cos(i * 0.6) * 0.1);
        const dur = (4.8 + Math.sin(i * 1.1) * 1.6).toFixed(2);
        const delay = (Math.sin(i * 3.3) * 2).toFixed(2);
        const anim = anims[i % anims.length];
        const href = tall ? '#wheatStalkTall' : '#wheatStalk';
        stalks.push(
          `<g class="stalk" style="animation:${anim} ${dur}s ease-in-out ${delay}s infinite alternate; opacity:${opacity.toFixed(2)}" transform="translate(${x},${y}) scale(${scale.toFixed(2)})"><use href="${href}"/></g>`
        );
      }
      field.innerHTML = stalks.join('');
    })();

    // Drifting gold dust particles
    (function renderDust() {
      const dust = document.getElementById('dust');
      if (!dust) return;
      const parts = [];
      for (let i = 0; i < 18; i++) {
        const x = Math.random() * 100;
        const dx = (Math.random() * 40 - 20) + 'vw';
        const dur = (28 + Math.random() * 20).toFixed(1) + 's';
        const delay = (-Math.random() * 30).toFixed(1) + 's';
        const size = (2 + Math.random() * 3).toFixed(1) + 'px';
        parts.push(`<span style="left:${x.toFixed(1)}vw; width:${size}; height:${size}; --dx:${dx}; animation-duration:${dur}; animation-delay:${delay};"></span>`);
      }
      dust.innerHTML = parts.join('');
    })();
  </script>

const calcCallPnl = (strike, prem, qty, price) => (Math.max(0, price - strike) - prem) * qty * 100;
const calcSpreadPnl = (longK, shortK, netDebit, qty, price) =>
  (Math.min(Math.max(price - longK, 0), shortK - longK) - netDebit) * qty * 100;

const fmtDollar = (n, d = 2) => `$${n.toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d })}`;
const fmtSigned = (n) => `${n >= 0 ? "+" : "−"}$${Math.abs(n).toLocaleString("en-US", { maximumFractionDigits: 0 })}`;
const fmtPct = (n, d = 1) => `${n >= 0 ? "+" : ""}${n.toFixed(d)}%`;
const fmtK = (n) => {
  const abs = Math.abs(n);
  if (abs >= 1e6) return `${(n/1e6).toFixed(2)}M`;
  if (abs >= 1e3) return `${(n/1e3).toFixed(abs >= 1e4 ? 0 : 1)}k`;
  return n.toFixed(0);
};

function buildEquityPositions(budget) {
  return equityBasket.map(h => {
    const dollars = budget * 0.40 * h.weight;
    const shares = Math.floor(dollars / h.price);
    const cost = shares * h.price;
    return { ...h, dollars, shares, cost };
  });
}

function buildOptionsPositions(budget) {
  return optionsTranches.map(tr => {
    const sleeveBudget = budget * 0.60 * tr.sleevePct;
    const perLeg = sleeveBudget / tr.positions.length;
    const positions = tr.positions.map(p => {
      if (p.type === "spread") {
        const qty = Math.floor(perLeg / (p.netDebit * 100));
        const cost = qty * p.netDebit * 100;
        const spot = spots[p.ticker];
        const breakeven = p.longStrike + p.netDebit;
        const bePct = (breakeven / spot - 1) * 100;
        const maxValue = (p.shortStrike - p.longStrike);
        const maxProfit = (maxValue - p.netDebit) * qty * 100;
        const maxLoss = -p.netDebit * qty * 100;
        return { ...p, qty, cost, spot, breakeven, bePct, maxValue, maxProfit, maxLoss };
      } else {
        const qty = Math.floor(perLeg / (p.prem * 100));
        const cost = qty * p.prem * 100;
        const spot = spots[p.ticker];
        const breakeven = p.strike + p.prem;
        const bePct = (breakeven / spot - 1) * 100;
        return { ...p, qty, cost, spot, breakeven, bePct };
      }
    });
    const cost = positions.reduce((s, p) => s + p.cost, 0);
    return { ...tr, positions, cost };
  });
}

function pnlForScenarioOptions(trancheList, sc) {
  return trancheList.map(tr => {
    const legs = tr.positions.map(p => {
      const px = sc.prices[p.ticker];
      const pnl = p.type === "spread"
        ? calcSpreadPnl(p.longStrike, p.shortStrike, p.netDebit, p.qty, px)
        : calcCallPnl(p.strike, p.prem, p.qty, px);
      return { ...p, scenarioPrice: px, pnl };
    });
    const pnl = legs.reduce((s, l) => s + l.pnl, 0);
    const ret = tr.cost > 0 ? pnl / tr.cost * 100 : 0;
    return { ...tr, legs, pnl, ret };
  });
}

function pnlForScenarioEquity(equityList, scKey) {
  return equityList.map(h => {
    const r = equityBucketReturns[h.bucket][scKey];
    const pnl = h.cost * r;
    return { ...h, scenarioReturn: r, pnl };
  });
}

// SVG helpers
const polar = (cx, cy, r, degrees) => {
  const rad = (degrees - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
};
const arcPath = (cx, cy, r, startAngle, endAngle) => {
  const start = polar(cx, cy, r, endAngle);
  const end = polar(cx, cy, r, startAngle);
  const large = endAngle - startAngle <= 180 ? "0" : "1";
  return `M ${cx} ${cy} L ${start.x} ${start.y} A ${r} ${r} 0 ${large} 0 ${end.x} ${end.y} Z`;
};

/* ═══════════════════════════════════════════════════════════
   PRIMITIVE COMPONENTS
   ═══════════════════════════════════════════════════════════ */
function useInView(options = { threshold: 0.15, rootMargin: "0px 0px -50px 0px" }) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setInView(true); io.disconnect(); }
    }, options);
    io.observe(el);
    return () => io.disconnect();
  }, []);
  return [ref, inView];
}

function Reveal({ children, delay = 0, as: Tag = "div", style, ...rest }) {
  const [ref, inView] = useInView();
  const cls = [
    "reveal",
    delay > 0 ? `reveal-delay-${delay}` : "",
    inView ? "in" : "",
    rest.className || "",
  ].filter(Boolean).join(" ");
  return <Tag ref={ref} className={cls} style={style}>{children}</Tag>;
}

function AnimatedCounter({ value, format = (v) => v.toFixed(0), duration = 900, className, style }) {
  const [display, setDisplay] = useState(value);
  const fromRef = useRef(value);
  const rafRef = useRef(null);
  const startRef = useRef(0);
  useEffect(() => {
    const from = fromRef.current;
    const to = value;
    if (from === to) return;
    const start = performance.now();
    startRef.current = start;
    const step = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const v = from + (to - from) * eased;
      setDisplay(v);
      if (t < 1) {
        rafRef.current = requestAnimationFrame(step);
      } else {
        fromRef.current = to;
      }
    };
    rafRef.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(rafRef.current);
  }, [value, duration]);
  return <span className={className} style={style}>{format(display)}</span>;
}

/* ═══════════════════════════════════════════════════════════
   PIE CHART
   ═══════════════════════════════════════════════════════════ */
function PieChart({ slices, size = 300, innerRadius = 80, onHover }) {
  const [ref, inView] = useInView({ threshold: 0.3 });
  const [hoverIdx, setHoverIdx] = useState(null);
  const [tip, setTip] = useState(null);
  const cx = size / 2, cy = size / 2;
  const r = size / 2 - 8;

  const total = slices.reduce((s, sl) => s + sl.value, 0);
  let cumulative = 0;
  const enriched = slices.map((sl, i) => {
    const startAngle = (cumulative / total) * 360;
    cumulative += sl.value;
    const endAngle = (cumulative / total) * 360;
    const midAngle = (startAngle + endAngle) / 2;
    const mid = polar(cx, cy, r * 0.75, midAngle);
    const offset = polar(0, 0, 8, midAngle);
    return { ...sl, startAngle, endAngle, midAngle, mid, offset, idx: i };
  });

  return (
    <div ref={ref} style={{ position: "relative", display: "inline-block" }}>
      <svg width={size} height={size} style={{ display: "block" }}>
        <defs>
          <filter id="pieShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="4"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        {enriched.map((sl, i) => {
          const scale = inView ? 1 : 0.2;
          const opacity = inView ? 1 : 0;
          const isHover = hoverIdx === i;
          const translate = isHover ? `translate(${sl.offset.x}, ${sl.offset.y})` : "translate(0,0)";
          return (
            <g key={i}
               className="pie-slice"
               style={{
                 opacity,
                 transform: `${translate} scale(${scale})`,
                 transformOrigin: `${cx}px ${cy}px`,
                 transition: `transform 0.8s cubic-bezier(0.22,0.61,0.36,1) ${i * 40}ms, opacity 0.6s ease ${i * 40}ms`,
               }}
               onMouseEnter={(e) => {
                 setHoverIdx(i);
                 const rect = e.currentTarget.ownerSVGElement.getBoundingClientRect();
                 setTip({ x: sl.mid.x, y: sl.mid.y, slice: sl });
                 if (onHover) onHover(sl);
               }}
               onMouseLeave={() => { setHoverIdx(null); setTip(null); if (onHover) onHover(null); }}>
              <path d={arcPath(cx, cy, r, sl.startAngle, sl.endAngle)}
                    fill={sl.color}
                    filter="url(#pieShadow)"/>
            </g>
          );
        })}
        {/* Inner donut hole */}
        <circle cx={cx} cy={cy} r={innerRadius} fill={C.boneLight} />
        <circle cx={cx} cy={cy} r={innerRadius} fill="none" stroke={C.boneDark} strokeWidth="1"/>
        <text x={cx} y={cy - 8} textAnchor="middle" fontFamily={FH} fontSize="13" fill={C.gray} style={{ textTransform: "uppercase", letterSpacing: 1.5 }}>Equity basket</text>
        <text x={cx} y={cy + 18} textAnchor="middle" fontFamily={FH} fontSize="30" fontWeight="700" fill={C.black}>$40,000</text>
        <text x={cx} y={cy + 38} textAnchor="middle" fontFamily={FB} fontSize="12" fill={C.grayLight}>40% of portfolio</text>
      </svg>
      {tip && (
        <div className="pie-tooltip visible" style={{ left: tip.x, top: tip.y }}>
          <div style={{ fontFamily: FH, fontSize: 16, fontWeight: 700, marginBottom: 2 }}>{tip.slice.ticker}</div>
          <div style={{ opacity: 0.85, fontSize: 12 }}>{tip.slice.label}</div>
          <div style={{ marginTop: 6, fontSize: 13 }}>
            <strong>{(tip.slice.value * 100).toFixed(0)}%</strong> · ${tip.slice.dollars.toLocaleString()}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   SPARKLINE / LINE CHART
   ═══════════════════════════════════════════════════════════ */
function Sparkline({ points, color, height = 50, width = 220, strokeWidth = 2, fill = true }) {
  const [ref, inView] = useInView({ threshold: 0.2 });
  if (!points || points.length < 2) return <svg width={width} height={height}/>;
  const values = points.map(p => p[1]);
  const vmin = Math.min(...values), vmax = Math.max(...values);
  const vrange = vmax - vmin || 1;
  const padY = 4;
  const step = width / (points.length - 1);
  const path = points.map((p, i) => {
    const x = i * step;
    const y = height - padY - ((p[1] - vmin) / vrange) * (height - 2 * padY);
    return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
  }).join(' ');
  const areaPath = `${path} L ${width} ${height} L 0 ${height} Z`;
  const pathRef = useRef(null);
  const [len, setLen] = useState(800);
  useLayoutEffect(() => {
    if (pathRef.current) {
      const l = pathRef.current.getTotalLength();
      setLen(l + 2);
    }
  }, [path]);
  const lastY = height - padY - ((values[values.length-1] - vmin) / vrange) * (height - 2 * padY);

  return (
    <svg ref={ref} width={width} height={height} style={{ display: "block" }}>
      <defs>
        <linearGradient id={`sparkGrad-${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.22"/>
          <stop offset="100%" stopColor={color} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      {fill && <path d={areaPath} fill={`url(#sparkGrad-${color.replace('#','')})`} opacity={inView ? 1 : 0} style={{ transition: "opacity 0.8s ease 0.5s" }}/>}
      <path
        ref={pathRef}
        d={path}
        fill="none"
        stroke={color}
        strokeWidth={strokeWidth}
        strokeLinecap="round"
        strokeLinejoin="round"
        style={{
          strokeDasharray: len,
          strokeDashoffset: inView ? 0 : len,
          transition: "stroke-dashoffset 1.6s cubic-bezier(0.22,0.61,0.36,1)",
        }}
      />
      <circle cx={width} cy={lastY} r="3.5" fill={color} opacity={inView ? 1 : 0} style={{ transition: "opacity 0.4s ease 1.6s" }}/>
    </svg>
  );
}

/* ═══════════════════════════════════════════════════════════
   PRECEDENT OVERLAY
   ═══════════════════════════════════════════════════════════ */
function PrecedentOverlay() {
  const [ref, inView] = useInView({ threshold: 0.2 });
  const eras = ["1973", "2007", "2022", "2026"];
  const W = 720, H = 320, L = 50, R = 20, T = 20, B = 32;
  const innerW = W - L - R, innerH = H - T - B;
  const maxM = 48; // months horizontal
  const minP = -30, maxP = 200;
  const pathFor = (points) => {
    if (!points || points.length < 2) return "";
    return points.map((p, i) => {
      const x = L + (p.m / maxM) * innerW;
      const y = T + innerH - ((p.p - minP) / (maxP - minP)) * innerH;
      return `${i === 0 ? 'M' : 'L'} ${x} ${y}`;
    }).join(' ');
  };
  return (
    <div ref={ref} style={{ background: C.white, border: `1px solid ${C.boneDark}`, borderRadius: 12, padding: "24px 28px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 16 }}>
        <div>
          <div style={{ fontFamily: FB, fontSize: 12, color: C.gray, textTransform: "uppercase", letterSpacing: 1.8 }}>Historical precedent overlay</div>
          <div style={{ fontFamily: FH, fontSize: 26, fontWeight: 500, color: C.black, marginTop: 4 }}>Three prior shocks, normalized wheat-PPI path</div>
        </div>
        <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
          {eras.map(e => (
            <div key={e} style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 14, height: 3, background: PRECEDENTS[e].color, borderRadius: 2 }}/>
              <span style={{ fontFamily: FB, fontSize: 12, color: C.black, fontWeight: 600 }}>{e}</span>
            </div>
          ))}
        </div>
      </div>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
        {/* grid */}
        {[-25, 0, 50, 100, 150, 200].map(p => {
          const y = T + innerH - ((p - minP) / (maxP - minP)) * innerH;
          return (
            <g key={p}>
              <line x1={L} x2={W-R} y1={y} y2={y} stroke={C.boneDark} strokeWidth={p === 0 ? 1.2 : 0.6} strokeDasharray={p === 0 ? "none" : "2 4"}/>
              <text x={L-8} y={y+4} textAnchor="end" fontFamily={FB} fontSize="10" fill={C.grayLight}>{p >= 0 ? '+' : ''}{p}%</text>
            </g>
          );
        })}
        {[0, 12, 24, 36, 48].map(m => {
          const x = L + (m / maxM) * innerW;
          return (
            <g key={m}>
              <line x1={x} x2={x} y1={T} y2={T+innerH} stroke={C.boneDark} strokeWidth={0.5} strokeDasharray="2 4"/>
              <text x={x} y={T+innerH+18} textAnchor="middle" fontFamily={FB} fontSize="10" fill={C.grayLight}>m{m}</text>
            </g>
          );
        })}
        {/* paths */}
        {eras.map((e, idx) => {
          const pts = PRECEDENTS[e].wheat;
          if (!pts) return null;
          const d = pathFor(pts);
          const totalLen = 1200;
          return (
            <g key={e}>
              <path
                d={d}
                fill="none"
                stroke={PRECEDENTS[e].color}
                strokeWidth={PRECEDENTS[e].current ? 3.5 : 2.2}
                strokeLinecap="round"
                strokeDasharray={PRECEDENTS[e].current ? "none" : (idx === 0 ? "none" : "none")}
                style={{
                  strokeDasharray: totalLen,
                  strokeDashoffset: inView ? 0 : totalLen,
                  transition: `stroke-dashoffset 2s cubic-bezier(0.22,0.61,0.36,1) ${idx * 250}ms`,
                  opacity: PRECEDENTS[e].current ? 1 : 0.85,
                }}
              />
              {PRECEDENTS[e].current && pts.length > 0 && (() => {
                const last = pts[pts.length - 1];
                const x = L + (last.m / maxM) * innerW;
                const y = T + innerH - ((last.p - minP) / (maxP - minP)) * innerH;
                return (
                  <g>
                    <circle cx={x} cy={y} r="8" fill={PRECEDENTS[e].color} opacity="0.25" className="pulse-ring"/>
                    <circle cx={x} cy={y} r="5" fill={PRECEDENTS[e].color}/>
                    <text x={x+12} y={y+4} fontFamily={FB} fontSize="12" fill={PRECEDENTS[e].color} fontWeight="700">TODAY</text>
                  </g>
                );
              })()}
            </g>
          );
        })}
        <text x={L} y={T-4} fontFamily={FB} fontSize="11" fill={C.grayLight}>Wheat PPI % change from shock start</text>
      </svg>
      <div style={{ marginTop: 14, display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
        {eras.map(e => {
          const pts = PRECEDENTS[e].wheat;
          const peak = pts ? Math.max(...pts.map(p => p.p)) : null;
          return (
            <div key={e} style={{ background: C.boneLight, borderLeft: `3px solid ${PRECEDENTS[e].color}`, padding: "10px 14px", borderRadius: 6 }}>
              <div style={{ fontFamily: FH, fontSize: 16, fontWeight: 700, color: PRECEDENTS[e].color }}>{PRECEDENTS[e].label}</div>
              <div style={{ fontFamily: FB, fontSize: 12, color: C.gray }}>
                Peak wheat move: <strong style={{ color: C.black }}>{peak !== null ? (peak >= 0 ? '+' : '') + peak.toFixed(1) + '%' : '—'}</strong>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   DEBIT SPREAD PAYOFF DIAGRAM
   ═══════════════════════════════════════════════════════════ */
function SpreadPayoff({ pos, scenarioPrice, scenarioColor }) {
  const { longStrike: K1, shortStrike: K2, netDebit, spot, breakeven } = pos;
  const xMin = Math.min(K1 * 0.80, spot * 0.85);
  const xMax = K2 * 1.18;
  const xRange = xMax - xMin;
  const H = 120, W = 440, L = 30, R = 20, T = 18, B = 32;
  const innerW = W - L - R, innerH = H - T - B;
  const xToPx = (x) => L + ((x - xMin) / xRange) * innerW;
  const pnlMax = (K2 - K1) - netDebit;
  const pnlMin = -netDebit;
  const pnlRange = pnlMax - pnlMin;
  const yToPx = (p) => T + innerH - ((p - pnlMin) / pnlRange) * innerH;
  const zeroY = yToPx(0);
  const pts = [
    [xMin, pnlMin],
    [K1, pnlMin],
    [K2, pnlMax],
    [xMax, pnlMax],
  ];
  const path = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xToPx(p[0])} ${yToPx(p[1])}`).join(' ');
  const areaPath = `${path} L ${xToPx(xMax)} ${zeroY} L ${xToPx(xMin)} ${zeroY} Z`;

  return (
    <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
      <defs>
        <linearGradient id={`spreadGrad-${pos.ticker}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={C.green} stopOpacity="0.22"/>
          <stop offset="100%" stopColor={C.green} stopOpacity="0.02"/>
        </linearGradient>
      </defs>
      <line x1={L} x2={W-R} y1={zeroY} y2={zeroY} stroke={C.boneDark} strokeWidth="1" strokeDasharray="3 3"/>
      <path d={areaPath} fill={`url(#spreadGrad-${pos.ticker})`}/>
      <path d={path} fill="none" stroke={C.green} strokeWidth="2.5" strokeLinejoin="round"/>
      {/* Strike markers */}
      <line x1={xToPx(K1)} x2={xToPx(K1)} y1={T} y2={T+innerH} stroke={C.blue} strokeWidth="1" strokeDasharray="2 2" opacity="0.7"/>
      <line x1={xToPx(K2)} x2={xToPx(K2)} y1={T} y2={T+innerH} stroke={C.blue} strokeWidth="1" strokeDasharray="2 2" opacity="0.7"/>
      <text x={xToPx(K1)} y={T-4} textAnchor="middle" fontFamily={FB} fontSize="10" fill={C.blue}>${K1}</text>
      <text x={xToPx(K2)} y={T-4} textAnchor="middle" fontFamily={FB} fontSize="10" fill={C.blue}>${K2}</text>
      {/* Breakeven */}
      <line x1={xToPx(breakeven)} x2={xToPx(breakeven)} y1={T} y2={T+innerH} stroke={C.gold} strokeWidth="1" strokeDasharray="1 3" opacity="0.8"/>
      <text x={xToPx(breakeven)} y={H-16} textAnchor="middle" fontFamily={FB} fontSize="9" fill={C.gold} fontWeight="700">BE ${breakeven.toFixed(2)}</text>
      {/* Spot */}
      <circle cx={xToPx(spot)} cy={yToPx(pnlMin)} r="4" fill={C.gray}/>
      <text x={xToPx(spot)} y={H-4} textAnchor="middle" fontFamily={FB} fontSize="9" fill={C.gray}>spot ${spot.toFixed(2)}</text>
      {/* Scenario marker */}
      {scenarioPrice !== undefined && (
        <g>
          <circle cx={xToPx(scenarioPrice)} cy={yToPx(scenarioPrice <= K1 ? pnlMin : scenarioPrice >= K2 ? pnlMax : pnlMin + ((scenarioPrice - K1) / (K2 - K1)) * pnlRange)} r="5" fill={scenarioColor}/>
          <text x={xToPx(scenarioPrice)} y={yToPx(scenarioPrice <= K1 ? pnlMin : scenarioPrice >= K2 ? pnlMax : pnlMin + ((scenarioPrice - K1) / (K2 - K1)) * pnlRange) - 8} textAnchor="middle" fontFamily={FB} fontSize="10" fill={scenarioColor} fontWeight="700">${scenarioPrice.toFixed(2)}</text>
        </g>
      )}
    </svg>
  );
}

function ScenarioMatrix({ equityPositions, optionsPositions }) {
  const scenarioList = Object.values(scenarios);
  const rowTotal = [];

  const buildRow = (label, key, values, bucket) => ({
    key, label, values, bucket,
  });

  // Equity aggregate
  const equityRows = scenarioList.map(sc => {
    const list = pnlForScenarioEquity(equityPositions, sc.key);
    const pnl = list.reduce((s, h) => s + h.pnl, 0);
    return pnl;
  });

  // Options by tranche
  const optRows = optionsTranches.map(tr => {
    return scenarioList.map(sc => {
      const trResult = pnlForScenarioOptions(optionsPositions.filter(t => t.id === tr.id), sc)[0];
      return trResult ? trResult.pnl : 0;
    });
  });

  const totalCost = optionsPositions.reduce((s, t) => s + t.cost, 0) + equityPositions.reduce((s, e) => s + e.cost, 0);

  const rows = [
    { label: "Core Equity Basket", sub: "40% · 9 names", color: C.green, values: equityRows, cost: equityPositions.reduce((s, e) => s + e.cost, 0) },
    { label: "Debit Spreads",      sub: "45% of options", color: C.blue, values: optRows[0], cost: optionsPositions[0]?.cost || 0 },
    { label: "OTM Calls",          sub: "40% of options", color: C.green, values: optRows[1], cost: optionsPositions[1]?.cost || 0 },
    { label: "Tail Convexity",     sub: "15% of options", color: C.gold, values: optRows[2], cost: optionsPositions[2]?.cost || 0 },
  ];

  const totals = scenarioList.map((_, i) => rows.reduce((s, r) => s + r.values[i], 0));

  return (
    <div style={{ background: C.white, border: `1px solid ${C.boneDark}`, borderRadius: 12, overflow: "hidden" }}>
      <div style={{ padding: "18px 24px", borderBottom: `1px solid ${C.boneDark}`, display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
        <div style={{ fontFamily: FH, fontSize: 22, fontWeight: 600, color: C.black }}>Payout matrix</div>

          <tr style={{ background: C.boneLight }}>
            <th style={{ padding: "14px 20px", textAlign: "left", fontSize: 12, color: C.gray, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>Layer</th>
            {scenarioList.map(s => (

function FXPanel() {
  return (
    <div style={{ background: C.white, border: `1px solid ${C.boneDark}`, borderRadius: 12, padding: "22px 26px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 14 }}>

      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
        {Object.entries(FX).map(([pair, d]) => {
          // For USD-base pairs (USDBRL, USDCAD) falling = foreign currency rising
          const isUSDBase = pair.startsWith("USD");
          const foreignUp = isUSDBase ? d.yoyPct < 0 : d.yoyPct > 0;
          const mag = Math.abs(d.yoyPct);
          return (
            <div key={pair} style={{ background: C.boneLight, border: `1px solid ${C.boneDark}`, borderLeft: `3px solid ${foreignUp ? C.green : C.salmon}`, borderRadius: 8, padding: "14px 16px" }}>

              <div style={{ fontFamily: FH, fontSize: 22, fontWeight: 700, color: C.black, marginTop: 2 }}>{d.close.toFixed(4)}</div>
              <div style={{ fontFamily: FB, fontSize: 14, fontWeight: 700, color: foreignUp ? C.green : C.salmon, marginTop: 4 }}>
                {isUSDBase ? (foreignUp ? `Foreign +${mag.toFixed(2)}%` : `Foreign −${mag.toFixed(2)}%`) : (foreignUp ? `+${mag.toFixed(2)}%` : `−${mag.toFixed(2)}%`)}
              </div>
              <div style={{ fontFamily: FB, fontSize: 11, color: C.grayLight, marginTop: 2, lineHeight: 1.4 }}>{d.label}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const equityPositions = useMemo(() => buildEquityPositions(budget), [budget]);
  const optionsPositions = useMemo(() => buildOptionsPositions(budget), [budget]);
  const equityCost = equityPositions.reduce((s, h) => s + h.cost, 0);
  const optionsCost = optionsPositions.reduce((s, t) => s + t.cost, 0);
  const deployed = equityCost + optionsCost;

  const scenarioData = useMemo(() =>
    Object.values(scenarios).map(sc => {
      const optResults = pnlForScenarioOptions(optionsPositions, sc);
      const optPnl = optResults.reduce((s, t) => s + t.pnl, 0);
      const eqResults = pnlForScenarioEquity(equityPositions, sc.key);
      const eqPnl = eqResults.reduce((s, h) => s + h.pnl, 0);
      const totalPnl = optPnl + eqPnl;
      return {
        ...sc,
        optResults, optPnl,
        eqResults, eqPnl,
        totalPnl,
        totalRet: deployed > 0 ? totalPnl / deployed * 100 : 0,
      };
    }), [equityPositions, optionsPositions, deployed]);

  const ev = scenarioData.reduce((s, sc) => s + sc.totalPnl * sc.prob, 0);
  const evRet = deployed > 0 ? ev / deployed * 100 : 0;
  const base = scenarioData.find(s => s.key === "base");
  const bull = scenarioData.find(s => s.key === "bull");
  const active = scenarioData.find(s => s.key === activeScenario);
  const pBigWin = scenarioData.filter(s => s.totalRet >= 100).reduce((sum, s) => sum + s.prob, 0);

  return (
    <div className="fade-in">
      <Reveal>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div style={{ fontFamily: FB, fontSize: 12, color: C.wheatDeep, textTransform: "uppercase", letterSpacing: 3, marginBottom: 12, fontWeight: 700 }}>Hormuz aftershock · 60/40 barbell convexity</div>
          <h2 style={{ fontFamily: FH, fontSize: 52, fontWeight: 300, color: C.black, margin: 0, letterSpacing: 0.4, lineHeight: 1.08 }}>
            Food inflation hasn't finished repricing.<br/>
            <span style={{ fontStyle: "italic", fontWeight: 500, color: C.greenDark }}>Lagged grains are how to own it.</span>
          </h2>
          <p style={{ fontFamily: FB, fontSize: 17, color: C.gray, maxWidth: 760, margin: "22px auto 0", lineHeight: 1.65 }}>
            40% diesel + FX equity basket · 60% options (spreads / OTM / tail). Grounded in live FRED, EODHD, and USDA data.
          </p>
        </div>
      </Reveal>

      <Reveal>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 32 }}>
          <HeadlineKPI label="Expected value"   numeric={ev}        animFormat={fmtSigned} sub={`${fmtPct(evRet, 0)} probability-weighted on ${fmtDollar(deployed, 0)} deployed`} color={ev >= 0 ? C.green : C.salmon} emphasis/>
          <HeadlineKPI label="Base case return" numeric={base.totalRet} animFormat={(v) => `${v >= 0 ? '+' : ''}${v.toFixed(0)}%`} sub={`${fmtSigned(base.totalPnl)} if the lag thesis plays out`} color={C.green}/>
          <HeadlineKPI label="Bull case return" numeric={bull.totalRet} animFormat={(v) => `${v >= 0 ? '+' : ''}${v.toFixed(0)}%`} sub={`${fmtSigned(bull.totalPnl)} if drought compounds`} color={C.greenDark}/>
          <HeadlineKPI label="Odds of 50%+ gain" value={`${((base.totalRet >= 50 ? 0.5 : 0) + (bull.totalRet >= 50 ? 0.25 : 0) + (scenarioData[0].totalRet >= 50 ? 0.25 : 0)) * 100}%`} sub={`Base ${fmtPct(base.totalRet,0)} + Bull ${fmtPct(bull.totalRet,0)} both clear threshold`} color={C.wheatDeep}/>
        </div>
      </Reveal>

      <Reveal>
        <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 16, marginBottom: 32 }}>
          <div style={{ background: C.white, border: `1px solid ${C.boneDark}`, borderRadius: 12, padding: "22px 24px" }}>
            <div style={{ fontFamily: FB, fontSize: 12, color: C.gray, textTransform: "uppercase", letterSpacing: 1.8, marginBottom: 10 }}>Portfolio size</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <span style={{ fontFamily: FH, fontSize: 30, color: C.grayLight }}>$</span>
              <input type="number" step="5000" value={budget}
                onChange={(e) => setBudget(Math.max(0, parseInt(e.target.value, 10) || 0))}
                style={{ width: 180, padding: "8px 14px", border: `1px solid ${C.boneDark}`, borderRadius: 6, fontFamily: FH, fontSize: 26, fontWeight: 600, color: C.black, background: C.boneLight, outline: "none" }}/>
            </div>
            <div style={{ fontFamily: FB, fontSize: 13, color: C.gray, lineHeight: 1.6 }}>
              Deployed: <strong style={{ color: C.black }}>{fmtDollar(deployed, 0)}</strong><br/>
              Equity: <strong style={{ color: C.green }}>{fmtDollar(equityCost, 0)}</strong> · Options: <strong style={{ color: C.blue }}>{fmtDollar(optionsCost, 0)}</strong><br/>
              Max option loss: <strong style={{ color: C.salmon }}>{fmtDollar(optionsCost, 0)}</strong> (premium)<br/>
              <span style={{ color: C.grayLight, fontStyle: "italic" }}>Live quotes where marked; Black-Scholes estimates for adjacent strikes.</span>
            </div>
          </div>
          <div style={{ background: C.white, border: `1px solid ${C.boneDark}`, borderRadius: 12, padding: "18px 20px" }}>
            <div style={{ fontFamily: FB, fontSize: 12, color: C.gray, textTransform: "uppercase", letterSpacing: 1.8, marginBottom: 12 }}>Today's tape</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
              {tape.map(item => <TapeTile key={item.ticker} item={item}/>)}
            </div>
          </div>
        </div>
      </Reveal>

      <Reveal>
        <div style={{ marginBottom: 26 }}>
          <div style={{ fontFamily: FH, fontSize: 24, fontWeight: 500, color: C.black, marginBottom: 14 }}>Scenarios</div>
          <ScenarioPicker scenarioData={scenarioData} active={activeScenario} onPick={setActiveScenario}/>
        </div>
      </Reveal>

      {/* Takeaway ribbon */}
      <Reveal>
        <div className="ribbon-anim grain-texture" style={{
          background: `linear-gradient(135deg, ${active.color}, ${C.greenDeep} 140%)`,
          borderRadius: 12, padding: "24px 34px", marginBottom: 32, color: C.white,
          display: "flex", justifyContent: "space-between", alignItems: "center", gap: 24,
        }}>
          <div>
            <div style={{ fontFamily: FB, fontSize: 12, textTransform: "uppercase", letterSpacing: 2, opacity: 0.72 }}>If the {active.label.toLowerCase()} scenario plays out</div>
            <div style={{ fontFamily: FH, fontSize: 28, fontWeight: 500, marginTop: 4, lineHeight: 1.3 }}>{active.takeaway}</div>
          </div>
          <div style={{ textAlign: "right", minWidth: 240 }}>
            <div style={{ fontFamily: FB, fontSize: 12, textTransform: "uppercase", letterSpacing: 2, opacity: 0.72 }}>Portfolio P&amp;L</div>
            <div style={{ fontFamily: FH, fontSize: 44, fontWeight: 700, marginTop: 2 }}>
              <AnimatedCounter value={active.totalPnl} format={fmtSigned}/>
            </div>
            <div style={{ fontFamily: FB, fontSize: 16, opacity: 0.88 }}>
              <AnimatedCounter value={active.totalRet} format={(v) => `${v >= 0 ? '+' : ''}${v.toFixed(0)}% return`}/>
            </div>
          </div>
        </div>
      </Reveal>

      <Reveal>
        <div style={{ marginBottom: 28 }}>
          <EquityBasketPanel holdings={equityPositions} activeScenario={activeScenario}/>
        </div>
      </Reveal>

      <Reveal>
        <div style={{ marginBottom: 28 }}>
          <OptionsSleevePanel trancheResults={active.optResults} activeScenarioLabel={active.label}/>
        </div>
      </Reveal>

      <Reveal>
        <div style={{ marginBottom: 28 }}>
          <ScenarioMatrix equityPositions={equityPositions} optionsPositions={optionsPositions}/>
        </div>
      </Reveal>

      <Divider/>

      <Reveal>
        <div style={{ marginBottom: 28 }}>
          <HistoricalMap/>
        </div>
      </Reveal>

      <Reveal>
        <div style={{ marginBottom: 28 }}>
          <TransmissionTimeline/>
        </div>
      </Reveal>
    </div>
  );
}
