    // Render wheat stalks on load (procedural placement)
    (function renderField() {
      const field = document.getElementById('field');
      const anims = ['windA','windB','windC','windD','windE'];
      const stalks = [];
      // Two rows: back row (smaller, more faded), front row (taller)
      for (let i = 0; i < 46; i++) {
        const x = Math.round((i / 45) * 1600 + (Math.sin(i * 1.7) * 18));
        const tall = i % 2 === 0;
        const scale = (tall ? 0.85 : 0.6) + (Math.sin(i * 2.3) * 0.18);
        const y = tall ? 318 : 322 + (Math.cos(i * 1.9) * 4);
        const opacity = tall ? (0.45 + Math.sin(i * 0.9) * 0.15) : (0.28 + Math.cos(i * 0.6) * 0.1);
        const dur = (4.8 + Math.sin(i * 1.1) * 1.6).toFixed(2);
        const delay = (Math.sin(i * 3.3) * 2).toFixed(2);
        const anim = anims[i % anims.length];
        const href = tall ? '#wheatStalkTall' : '#wheatStalk';
        stalks.push(
          `<g class="stalk" style="animation:${anim} ${dur}s ease-in-out ${delay}s infinite alternate; opacity:${opacity.toFixed(2)}" transform="translate(${x},${y}) scale(${scale.toFixed(2)})"><use href="${href}"/></g>`
        );
      }
      field.innerHTML = stalks.join('');
    })();

// UTILITIES

const calcPnl = (strike, prem, qty, price) => (Math.max(0, price - strike) - prem) * qty * 100;
const fmtDollar  = (n, d=2) => `$${n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}`;
const fmtSigned  = (n) => `${n>=0?"+":"−"}$${Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0})}`;
const fmtPct     = (n, d=1) => `${n>=0?"+":""}${n.toFixed(d)}%`;

function buildPositions(budget) {
  return tranches.map((tr) => {
    const trancheBudget = budget * tr.pct / 100;
    const perLeg = trancheBudget / tr.positions.length;
    const positions = tr.positions.map((p) => {
      const qty = Math.floor(perLeg / (p.prem * 100));
      const cost = qty * p.prem * 100;
      const spot = spots[p.ticker];
      const breakeven = p.strike + p.prem;
      const bePct = (breakeven / spot - 1) * 100;
      return { ...p, qty, cost, spot, breakeven, bePct };
    });
    const cost = positions.reduce((s, p) => s + p.cost, 0);
    return { ...tr, positions, cost };
  });
}

function pnlForScenario(trancheList, sc) {
  return trancheList.map((tr) => {
    const legs = tr.positions.map((p) => {
      const px = sc.prices[p.ticker];
      const pnl = calcPnl(p.strike, p.prem, p.qty, px);
      return { ...p, scenarioPrice: px, pnl };
    });
    const pnl = legs.reduce((s, l) => s + l.pnl, 0);
    const ret = tr.cost > 0 ? pnl / tr.cost * 100 : 0;
    return { ...tr, legs, pnl, ret };
  });
}

// ═════════════════════════════════════════════════════════════
// MAIN DASHBOARD
// ═════════════════════════════════════════════════════════════
function Dashboard() {
  const [budget, setBudget] = useState(100000);
  const [activeScenario, setActiveScenario] = useState("base");

  const positions = useMemo(() => buildPositions(budget), [budget]);
  const deployed  = positions.reduce((s, t) => s + t.cost, 0);

  const scenarioData = useMemo(() => (
    Object.values(scenarios).map((sc) => {
      const trancheResults = pnlForScenario(positions, sc);
      const pnl = trancheResults.reduce((s, t) => s + t.pnl, 0);
      return { ...sc, trancheResults, pnl, ret: deployed > 0 ? pnl / deployed * 100 : 0 };
    })
  ), [positions, deployed]);

  const ev = scenarioData.reduce((s, sc) => s + sc.pnl * sc.prob, 0);
  const evRet = deployed > 0 ? ev / deployed * 100 : 0;
  const base = scenarioData.find(s => s.key === "base");
  const bull = scenarioData.find(s => s.key === "bull");
  const active = scenarioData.find(s => s.key === activeScenario);

  // Probability of >100% gain = sum of probabilities of scenarios whose return > 100%
  const pBigWin = scenarioData.filter(s => s.ret >= 100).reduce((sum, s) => sum + s.prob, 0);

  return (
    <div className="fade-in">
      {/* Hero headline */}
      <div style={{ textAlign: "center", marginBottom: 36 }}>
        <div style={{ fontFamily: FB, fontSize: 12, color: C.wheatDeep, textTransform: "uppercase", letterSpacing: 3, marginBottom: 10, fontWeight: 600 }}>Hormuz aftershock · barbell convexity</div>
        <h2 style={{ fontFamily: FH, fontSize: 46, fontWeight: 300, color: C.black, margin: 0, letterSpacing: 0.4, lineHeight: 1.1 }}>
          Food inflation has not finished repricing.<br />
          <span style={{ fontStyle: "italic", fontWeight: 500, color: C.greenDark }}>Lagged grains are the cleanest way to own it.</span>
        </h2>
      </div>

      {/* Headline KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 30 }}>
        <HeadlineKPI label="Expected value" value={fmtSigned(ev)} sub={`${fmtPct(evRet, 0)} probability-weighted on ${fmtDollar(deployed, 0)} deployed`} color={ev >= 0 ? C.green : C.salmon} emphasis />
        <HeadlineKPI label="Base case return" value={fmtPct(base.ret, 0)} sub={`${fmtSigned(base.pnl)} if the 20% grain lag thesis plays out`} color={C.green} />
        <HeadlineKPI label="Bull case return" value={fmtPct(bull.ret, 0)} sub={`${fmtSigned(bull.pnl)} if drought compounds into summer`} color={C.greenDark} />
        <HeadlineKPI label="Odds of 100%+ gain" value={`${(pBigWin*100).toFixed(0)}%`} sub="Base and bull scenarios both exceed 100% return" color={C.wheatDeep} />
      </div>

      {/* Budget + tape */}
      <div style={{ display: "grid", gridTemplateColumns: "320px 1fr", gap: 16, marginBottom: 30 }}>
        <div style={{ background: C.white, border: `1px solid ${C.boneDark}`, borderRadius: 12, padding: "22px 24px" }}>
          <div style={{ fontFamily: FB, fontSize: 12, color: C.gray, textTransform: "uppercase", letterSpacing: 1.8, marginBottom: 10 }}>Portfolio size</div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <span style={{ fontFamily: FH, fontSize: 30, color: C.grayLight }}>$</span>
            <input
              type="number"
              step="5000"
              value={budget}
              onChange={(e) => setBudget(Math.max(0, parseInt(e.target.value, 10) || 0))}
              style={{ width: 180, padding: "8px 14px", border: `1px solid ${C.boneDark}`, borderRadius: 6, fontFamily: FH, fontSize: 26, fontWeight: 600, color: C.black, background: C.boneLight, outline: "none" }}
            />
          </div>
          <div style={{ fontFamily: FB, fontSize: 13, color: C.gray, lineHeight: 1.55 }}>
            Deployed: <strong style={{ color: C.black }}>{fmtDollar(deployed, 0)}</strong><br />
            Max loss: <strong style={{ color: C.salmon }}>{fmtDollar(deployed, 0)}</strong> (premium paid)<br />
            <span style={{ color: C.grayLight, fontStyle: "italic" }}>Live quotes where marked; estimates for adjacent strikes.</span>
          </div>
        </div>

        <div style={{ background: C.white, border: `1px solid ${C.boneDark}`, borderRadius: 12, padding: "18px 20px" }}>
          <div style={{ fontFamily: FB, fontSize: 12, color: C.gray, textTransform: "uppercase", letterSpacing: 1.8, marginBottom: 12 }}>Today&apos;s tape</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 10 }}>
            {tape.map(item => <TapeTile key={item.ticker} item={item} />)}
          </div>
        </div>
      </div>

      {/* Scenarios */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontFamily: FH, fontSize: 22, fontWeight: 500, color: C.black, marginBottom: 12 }}>Scenarios</div>
        <ScenarioPicker scenarioData={scenarioData} active={activeScenario} onPick={setActiveScenario} />
      </div>

      {/* Takeaway ribbon */}
      <div style={{ background: `linear-gradient(135deg, ${active.color} 0%, ${C.greenDeep} 140%)`, borderRadius: 12, padding: "22px 32px", marginBottom: 30, color: C.white, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 24 }}>
        <div>
          <div style={{ fontFamily: FB, fontSize: 12, textTransform: "uppercase", letterSpacing: 2, opacity: 0.72 }}>If the {active.label.toLowerCase()} scenario plays out</div>
          <div style={{ fontFamily: FH, fontSize: 26, fontWeight: 500, marginTop: 4 }}>{active.takeaway}</div>
        </div>
        <div style={{ textAlign: "right", minWidth: 220 }}>
          <div style={{ fontFamily: FB, fontSize: 12, textTransform: "uppercase", letterSpacing: 2, opacity: 0.72 }}>Portfolio P&amp;L</div>
          <div style={{ fontFamily: FH, fontSize: 42, fontWeight: 700, marginTop: 2 }}>{fmtSigned(active.pnl)}</div>
          <div style={{ fontFamily: FB, fontSize: 16, opacity: 0.88 }}>{fmtPct(active.ret, 0)} return</div>
        </div>
      </div>

      {/* Barbell */}
      <div style={{ marginBottom: 30 }}>
        <Barbell trancheResults={active.trancheResults} activeScenarioLabel={active.label} />
      </div>

      {/* Scenario matrix */}
      <div style={{ marginBottom: 30 }}>
        <ScenarioMatrix positions={positions} budget={budget} />
      </div>

      <Divider />

      {/* Historical shock map */}
      <div style={{ marginBottom: 30 }}>
        <HistoricalMap />
      </div>

      {/* Transmission timeline */}
      <div style={{ marginBottom: 30 }}>
        <TransmissionTimeline />
      </div>

      {/* Position detail table */}
      <div style={{ marginBottom: 30 }}>
        <PositionDetail positions={positions} scenarioKey={activeScenario} />
      </div>

      <Divider />
    </div>
  );
}
